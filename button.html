<style>
    .Subscribe_button {
        background-color: #ff0000;
        color: white;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 16px;
        padding-right:16px;
        transition: opacity 0.15s,
            color 1s;
        vertical-align:top;    
    }

    .Subscribe_button:hover {
        background-color: rgb(255, 78, 55);

    }

    .Subscribe_button:active {
        background-color: #751717;
    }

    .join_button {
        background-color: white;
        border-color: rgb(48, 104, 177);
        border-style: solid;
        border-width: 1px;
        color: rgb(48, 104, 177);
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 16px;
        padding-right:16px;
        vertical-align:top;    
        

    }

    .join_button:hover {
        background-color: rgb(57, 80, 109);
        color: white;
    }

    .join_button:active {
        opacity: 0px;
    }

    .Twitter_button {
        background-color: rgb(2, 137, 255);
        color: white;
        border: none;
        height: 36px;
        width: 70px;
        border-radius: 18px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.15);
        transition: box-shadow 0.5;
        vertical-align:top;    

    }

    .Twitter_button:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
    }
</style>
<button class="Subscribe_button">
    Subscribe</button>
<button class="join_button">JOIN </button>
<button class="Twitter_button">Tweet</button>
